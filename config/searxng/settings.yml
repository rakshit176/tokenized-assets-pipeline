use_default_settings: true

general:
  instance_name: "Tokenized Assets Pipeline — SearXNG"
  debug: false

search:
  safe_search: 0
  default_lang: "en"
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

outgoing:
  request_timeout: 8.0
  max_request_timeout: 15.0

server:
  secret_key: ${SEARXNG_SECRET}
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: false
